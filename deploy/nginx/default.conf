map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

limit_req_zone $binary_remote_addr zone=gpt_actions_per_ip:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=app_api_read_per_ip:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=app_api_write_per_ip:10m rate=20r/m;
limit_req_status 429;
server_tokens off;

resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

upstream api_upstream {
  zone api_upstream 64k;
  server api:8000 resolve;
}

server {
  listen 80;
  server_name open.heley.uk;
  client_max_body_size 64k;

  location = /api/gpt/openapi.json {
    limit_except GET HEAD { deny all; }
    limit_req zone=gpt_actions_per_ip burst=10 nodelay;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
    proxy_pass http://api_upstream/gpt/openapi.json;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  location = /api/gpt/ping {
    limit_except GET HEAD { deny all; }
    limit_req zone=gpt_actions_per_ip burst=10 nodelay;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
    proxy_pass http://api_upstream/gpt/ping;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  location = /api/gpt/search {
    limit_except POST { deny all; }
    limit_req zone=gpt_actions_per_ip burst=10 nodelay;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
    proxy_pass http://api_upstream/gpt/search;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  location / {
    return 404;
  }
}

server {
  listen 80 default_server;
  server_name localhost _;
  client_max_body_size 25m;
  root /usr/share/nginx/html/frontend;
  index index.html;

  auth_basic ${APP_PROXY_BASIC_AUTH_REALM};
  auth_basic_user_file /etc/nginx/auth/app-users.htpasswd;

  location = /livez {
    auth_basic off;
    proxy_pass http://api_upstream/livez;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  location = /healthz {
    auth_basic off;
    proxy_pass http://api_upstream/healthz;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  location = /readyz {
    auth_basic off;
    proxy_pass http://api_upstream/readyz;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  location ~ ^/api/(?:buckets(?:/[^/]+)?|collections/[^/]+/sections/rebuild|collections/[^/]+/scan|collections/[^/]+/documents/(?:upload|split/(?:preview|upload)|(?!resolve$)[^/]+(?:/(?:metadata(?:/fetch)?|reindex))?))$ {
    limit_req zone=app_api_write_per_ip burst=10 nodelay;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location /api/ {
    limit_req zone=app_api_read_per_ip burst=30 nodelay;
    proxy_pass http://api_upstream/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location = /docs {
    return 301 /docs/;
  }

  location /docs/ {
    alias /usr/share/nginx/html/docs/;
    index index.html;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri $uri/ /index.html;
  }
}
