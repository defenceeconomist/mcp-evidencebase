map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

limit_req_zone $binary_remote_addr zone=gpt_actions_per_ip:10m rate=30r/m;
server_tokens off;

resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

upstream minio_api_upstream {
  zone minio_api_upstream 64k;
  server minio:9000 resolve;
}

upstream minio_console_upstream {
  zone minio_console_upstream 64k;
  server minio:9001 resolve;
}

upstream redisinsight_upstream {
  zone redisinsight_upstream 64k;
  server redisinsight:5540 resolve;
}

upstream api_upstream {
  zone api_upstream 64k;
  server api:8000 resolve;
}

upstream qdrant_upstream {
  zone qdrant_upstream 64k;
  server qdrant:6333 resolve;
}

server {
  listen 80;
  server_name open.heley.uk;
  client_max_body_size 64k;

  location = /api/gpt/openapi.json {
    limit_except GET HEAD { deny all; }
    limit_req zone=gpt_actions_per_ip burst=10 nodelay;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
    proxy_pass http://api_upstream/gpt/openapi.json;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  location = /api/gpt/ping {
    limit_except GET HEAD { deny all; }
    limit_req zone=gpt_actions_per_ip burst=10 nodelay;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
    proxy_pass http://api_upstream/gpt/ping;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  location = /api/gpt/search {
    limit_except POST { deny all; }
    limit_req zone=gpt_actions_per_ip burst=10 nodelay;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
    proxy_pass http://api_upstream/gpt/search;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  location / {
    return 404;
  }
}

server {
  listen 80 default_server;
  server_name localhost _;
  client_max_body_size 100m;
  root /usr/share/nginx/html/frontend;
  index index.html;

  location = /minio {
    return 301 /minio/;
  }

  location /minio/ {
    rewrite ^/minio/?(.*)$ /$1 break;
    proxy_pass http://minio_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location = /minio-console {
    return 301 /minio-console/;
  }

  location /minio-console/ {
    rewrite ^/minio-console/?(.*)$ /$1 break;
    proxy_pass http://minio_console_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Accept-Encoding "";
    sub_filter_once on;
    sub_filter '<base href="/">' '<base href="/minio-console/">';
  }

  location = /redisinsight {
    return 301 /redisinsight/;
  }

  location /redisinsight/ {
    rewrite ^/redisinsight/?(.*)$ /$1 break;
    proxy_pass http://redisinsight_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter "var RIPROXYPATH = '';" "var RIPROXYPATH = '/redisinsight';";
    sub_filter 'href="/' 'href="/redisinsight/';
    sub_filter 'src="/' 'src="/redisinsight/';
  }

  location /api/ {
    proxy_pass http://api_upstream/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location = /docs {
    return 301 /docs/;
  }

  location /docs/ {
    alias /usr/share/nginx/html/docs/;
    index index.html;
  }

  location = /dashboard {
    return 301 /dashboard/;
  }

  location /dashboard/ {
    proxy_pass http://qdrant_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location ~ ^/(collections|aliases|cluster|locks|metrics|telemetry|snapshots|healthz|livez|readyz)(/|$) {
    proxy_pass http://qdrant_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri $uri/ /index.html;
  }
}
