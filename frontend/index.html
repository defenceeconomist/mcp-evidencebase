<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Evidence Base</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/flatly/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-body-tertiary">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand fw-semibold" href="/">Evidence Base</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                id="developerToolsMenu"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Developer Tools
              </a>
              <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="developerToolsMenu">
                <li><h6 class="dropdown-header">Dashboards</h6></li>
                <li><a class="dropdown-item" data-path="/minio-console/" href="#">MinIO Console</a></li>
                <li><a class="dropdown-item" data-path="/redisinsight/" href="#">Redis Insights</a></li>
                <li><a class="dropdown-item" data-path="/dashboard/" href="#">Qdrant Dashboard</a></li>
                <li><a class="dropdown-item" data-path="/flower/" href="#">Flower</a></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="card shadow-sm border-primary">
        <div class="card-body">
          <h1 class="h4 mb-3 text-primary">Developer Entry Point</h1>
          <p class="mb-0">
            Use the <strong>Developer Tools</strong> menu in the top-right to open each service.
          </p>
        </div>
      </div>
    </main>

    <script>
      (function () {
        const origin = window.location.origin;

        document.querySelectorAll("[data-path]").forEach((anchor) => {
          const path = anchor.getAttribute("data-path") || "";
          anchor.href = origin + path;
          anchor.target = "_blank";
          anchor.rel = "noopener noreferrer";
        });
      })();
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
