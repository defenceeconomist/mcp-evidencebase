x-app-image: &app-image
  image: ${APP_IMAGE:-mcp-evidencebase-app:latest}

x-app-build: &app-build
  build:
    context: .
    dockerfile: docker/app/Dockerfile

x-proxy-image: &proxy-image
  image: ${PROXY_IMAGE:-mcp-evidencebase-proxy:latest}

x-proxy-build: &proxy-build
  build:
    context: .
    dockerfile: docker/proxy/Dockerfile

x-backend-environment: &backend-environment
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:?CELERY_BROKER_URL must be set in .env or the environment}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?CELERY_RESULT_BACKEND must be set in .env or the environment}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
  MINIO_SECURE: ${MINIO_SECURE:-false}
  EVIDENCEBASE_STORAGE_BUCKET: ${EVIDENCEBASE_STORAGE_BUCKET:-evidence-base}
  REDIS_URL: ${REDIS_URL:?REDIS_URL must be set in .env or the environment}
  REDIS_PREFIX: ${REDIS_PREFIX:-evidencebase}
  QDRANT_URL: ${QDRANT_URL:?QDRANT_URL must be set in .env or the environment}
  QDRANT_API_KEY: ${QDRANT_API_KEY:-}
  QDRANT_COLLECTION_PREFIX: ${QDRANT_COLLECTION_PREFIX:-evidencebase}
  MCP_EVIDENCEBASE_REQUIRE_MINIO: ${MCP_EVIDENCEBASE_REQUIRE_MINIO:-true}
  MCP_EVIDENCEBASE_REQUIRE_REDIS: ${MCP_EVIDENCEBASE_REQUIRE_REDIS:-true}
  MCP_EVIDENCEBASE_REQUIRE_QDRANT: ${MCP_EVIDENCEBASE_REQUIRE_QDRANT:-true}
  MCP_EVIDENCEBASE_REQUIRE_CELERY_BROKER: ${MCP_EVIDENCEBASE_REQUIRE_CELERY_BROKER:-true}
  MCP_EVIDENCEBASE_REQUIRE_CELERY_RESULT_BACKEND: ${MCP_EVIDENCEBASE_REQUIRE_CELERY_RESULT_BACKEND:-true}
  UNSTRUCTURED_API_URL: ${UNSTRUCTURED_API_URL:-https://api.unstructuredapp.io/general/v0/general}
  UNSTRUCTURED_API_KEY: ${UNSTRUCTURED_API_KEY:-}
  UNSTRUCTURED_STRATEGY: ${UNSTRU1CTURED_STRATEGY:-hi_res}
  UNSTRUCTURED_TIMEOUT_SECONDS: ${UNSTRUCTURED_TIMEOUT_SECONDS:-900}
  FASTEMBED_MODEL: ${FASTEMBED_MODEL:-BAAI/bge-small-en-v1.5}
  FASTEMBED_KEYWORD_MODEL: ${FASTEMBED_KEYWORD_MODEL:-Qdrant/bm25}
  HF_HOME: ${HF_HOME:-/model-cache/huggingface}
  FASTEMBED_CACHE_PATH: ${FASTEMBED_CACHE_PATH:-/model-cache/fastembed}
  CHUNK_SIZE_CHARS: ${CHUNK_SIZE_CHARS:-3000}
  CHUNK_OVERLAP_CHARS: ${CHUNK_OVERLAP_CHARS:-0}
  CHUNKING_STRATEGY: ${CHUNKING_STRATEGY:-by_title}
  CHUNK_NEW_AFTER_N_CHARS: ${CHUNK_NEW_AFTER_N_CHARS:-2000}
  CHUNK_COMBINE_TEXT_UNDER_N_CHARS: ${CHUNK_COMBINE_TEXT_UNDER_N_CHARS:-500}
  CHUNK_EXCLUDE_ELEMENT_TYPES: ${CHUNK_EXCLUDE_ELEMENT_TYPES:-header,footer,pageheader,pagefooter,page-header,page-footer,uncategorizedtext,uncategorized_text}
  CHUNK_INCLUDE_TITLE_TEXT: ${CHUNK_INCLUDE_TITLE_TEXT:-false}
  CHUNK_IMAGE_TEXT_MODE: ${CHUNK_IMAGE_TEXT_MODE:-placeholder}
  CHUNK_PARAGRAPH_BREAK_STRATEGY: ${CHUNK_PARAGRAPH_BREAK_STRATEGY:-text}
  CHUNK_PRESERVE_PAGE_BREAKS: ${CHUNK_PRESERVE_PAGE_BREAKS:-true}
  MINIO_SCAN_INTERVAL_SECONDS: ${MINIO_SCAN_INTERVAL_SECONDS:-15}

services:
  celery:
    <<: [*app-image, *app-build]
    container_name: evidencebase-celery
    restart: unless-stopped
    environment:
      <<: *backend-environment
      CELERY_APP: ${CELERY_APP:-mcp_evidencebase.celery_app}
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-2}
    volumes:
      - model-cache:/model-cache
    command:
      [
        "celery",
        "-A",
        "mcp_evidencebase.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=${CELERY_WORKER_CONCURRENCY:-2}",
      ]
    networks:
      - default
      - datastores

  api:
    <<: [*app-image, *app-build]
    container_name: evidencebase-api
    restart: unless-stopped
    environment:
      <<: *backend-environment
      MINIO_REGION: ${MINIO_REGION:-}
      GPT_ACTIONS_API_KEY: ${GPT_ACTIONS_API_KEY:-}
      GPT_ACTIONS_LINK_BASE_URL: ${GPT_ACTIONS_LINK_BASE_URL:-}
    volumes:
      - model-cache:/model-cache
    networks:
      - default
      - datastores

  proxy:
    <<: [*proxy-image, *proxy-build]
    container_name: evidencebase-proxy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${PROXY_BIND_ADDRESS:-127.0.0.1}:${PROXY_PORT:-52180}:80"
    networks:
      - default
      - datastores

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: evidencebase-cloudflared
    restart: unless-stopped
    depends_on:
      proxy:
        condition: service_started
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - "${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required for the cloudflared service}"

volumes:
  model-cache:

networks:
  datastores:
    external: true
    name: ${SHARED_DATASTORE_NETWORK_NAME:-shared-datastores}
