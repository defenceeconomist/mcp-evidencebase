services:
  redis:
    image: redis:7.4-alpine
    container_name: evidencebase-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  redisinsight:
    image: redis/redisinsight:latest
    container_name: evidencebase-redisinsight
    restart: unless-stopped
    environment:
      RIPROXYPATH: /redisinsight
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - redisinsight-data:/data

  minio:
    image: minio/minio:latest
    container_name: evidencebase-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://minio:9000}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost:${PROXY_PORT:-52180}/minio-console}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: evidencebase-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-storage:/qdrant/storage

  celery:
    build:
      context: .
      dockerfile: docker/celery/Dockerfile
    container_name: evidencebase-celery
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_APP: ${CELERY_APP:-mcp_evidencebase.celery_app}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/2}
      REDIS_PREFIX: ${REDIS_PREFIX:-evidencebase}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION_PREFIX: ${QDRANT_COLLECTION_PREFIX:-evidencebase}
      UNSTRUCTURED_API_URL: ${UNSTRUCTURED_API_URL:-https://api.unstructuredapp.io/general/v0/general}
      UNSTRUCTURED_API_KEY: ${UNSTRUCTURED_API_KEY:-}
      UNSTRUCTURED_STRATEGY: ${UNSTRUCTURED_STRATEGY:-auto}
      UNSTRUCTURED_TIMEOUT_SECONDS: ${UNSTRUCTURED_TIMEOUT_SECONDS:-300}
      FASTEMBED_MODEL: ${FASTEMBED_MODEL:-BAAI/bge-small-en-v1.5}
      FASTEMBED_KEYWORD_MODEL: ${FASTEMBED_KEYWORD_MODEL:-Qdrant/bm25}
      HF_HOME: ${HF_HOME:-/model-cache/huggingface}
      FASTEMBED_CACHE_PATH: ${FASTEMBED_CACHE_PATH:-/model-cache/fastembed}
      CHUNK_SIZE_CHARS: ${CHUNK_SIZE_CHARS:-1200}
      CHUNK_OVERLAP_CHARS: ${CHUNK_OVERLAP_CHARS:-150}
      MINIO_SCAN_INTERVAL_SECONDS: ${MINIO_SCAN_INTERVAL_SECONDS:-15}
    volumes:
      - model-cache:/model-cache
    command: ["celery", "-A", "mcp_evidencebase.celery_app", "worker", "--loglevel=info"]

  flower:
    build:
      context: .
      dockerfile: docker/celery/Dockerfile
    container_name: evidencebase-flower
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      celery:
        condition: service_started
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_APP: ${CELERY_APP:-mcp_evidencebase.celery_app}
    command:
      [
        "celery",
        "-A",
        "mcp_evidencebase.celery_app",
        "flower",
        "--port=5555",
        "--url_prefix=/flower",
      ]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: evidencebase-frontend
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: evidencebase-api
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_REGION: ${MINIO_REGION:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/2}
      REDIS_PREFIX: ${REDIS_PREFIX:-evidencebase}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION_PREFIX: ${QDRANT_COLLECTION_PREFIX:-evidencebase}
      UNSTRUCTURED_API_URL: ${UNSTRUCTURED_API_URL:-https://api.unstructuredapp.io/general/v0/general}
      UNSTRUCTURED_API_KEY: ${UNSTRUCTURED_API_KEY:-}
      UNSTRUCTURED_STRATEGY: ${UNSTRUCTURED_STRATEGY:-auto}
      UNSTRUCTURED_TIMEOUT_SECONDS: ${UNSTRUCTURED_TIMEOUT_SECONDS:-300}
      FASTEMBED_MODEL: ${FASTEMBED_MODEL:-BAAI/bge-small-en-v1.5}
      FASTEMBED_KEYWORD_MODEL: ${FASTEMBED_KEYWORD_MODEL:-Qdrant/bm25}
      HF_HOME: ${HF_HOME:-/model-cache/huggingface}
      FASTEMBED_CACHE_PATH: ${FASTEMBED_CACHE_PATH:-/model-cache/fastembed}
      CHUNK_SIZE_CHARS: ${CHUNK_SIZE_CHARS:-1200}
      CHUNK_OVERLAP_CHARS: ${CHUNK_OVERLAP_CHARS:-150}
      MINIO_SCAN_INTERVAL_SECONDS: ${MINIO_SCAN_INTERVAL_SECONDS:-15}
      GPT_ACTIONS_API_KEY: ${GPT_ACTIONS_API_KEY:-}
      GPT_ACTIONS_LINK_BASE_URL: ${GPT_ACTIONS_LINK_BASE_URL:-https://evidencebase.heley.uk}
    volumes:
      - model-cache:/model-cache
    depends_on:
      minio:
        condition: service_started
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  docs:
    build:
      context: .
      dockerfile: docker/docs/Dockerfile
    container_name: evidencebase-docs
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    container_name: evidencebase-proxy
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      redisinsight:
        condition: service_started
      minio:
        condition: service_started
      qdrant:
        condition: service_started
      flower:
        condition: service_started
      api:
        condition: service_started
      docs:
        condition: service_started
    ports:
      - "${PROXY_PORT:-52180}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: evidencebase-cloudflared
    restart: unless-stopped
    depends_on:
      proxy:
        condition: service_started
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - "${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required for the cloudflared service}"
volumes:
  minio-data:
  qdrant-storage:
  redis-data:
  redisinsight-data:
  model-cache:
