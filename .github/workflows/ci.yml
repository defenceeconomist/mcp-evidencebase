name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_live_integration:
        description: Run live MinIO/Redis/Qdrant integration tests
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 4 * * *"

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: MyPy
        run: mypy src/mcp_evidencebase

      - name: Pytest (non-live)
        env:
          PYTHONPATH: src
        run: pytest -m "not integration_live"

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: python -m pip install -e ".[docs]"

      - name: Build docs
        env:
          PYTHONPATH: src
        run: sh docs/build_docs.sh

  live-integration:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_live_integration == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Start live datastores
        run: |
          docker run -d --name evidencebase-redis -p 6379:6379 redis:7-alpine
          docker run -d --name evidencebase-qdrant -p 6333:6333 qdrant/qdrant:latest
          docker run -d --name evidencebase-minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data --console-address ":9001"

      - name: Wait for live datastores
        run: |
          for _ in $(seq 1 30); do
            if docker exec evidencebase-redis redis-cli ping | grep -q PONG; then
              break
            fi
            sleep 2
          done

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:6333/collections >/dev/null; then
              break
            fi
            sleep 2
          done

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null; then
              break
            fi
            sleep 2
          done

          docker exec evidencebase-redis redis-cli ping
          curl -fsS http://127.0.0.1:6333/collections >/dev/null
          curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null

      - name: Pytest (live integration)
        env:
          PYTHONPATH: src
          MCP_EVIDENCEBASE_RUN_LIVE_INTEGRATION: "1"
          MCP_EVIDENCEBASE_LIVE_MINIO_ENDPOINT: 127.0.0.1:9000
          MCP_EVIDENCEBASE_LIVE_MINIO_ROOT_USER: minioadmin
          MCP_EVIDENCEBASE_LIVE_MINIO_ROOT_PASSWORD: minioadmin
          MCP_EVIDENCEBASE_LIVE_REDIS_URL: redis://127.0.0.1:6379/2
          MCP_EVIDENCEBASE_LIVE_QDRANT_URL: http://127.0.0.1:6333
        run: pytest -m integration_live tests/test_live_datastores_integration.py

      - name: Dump live datastore logs on failure
        if: failure()
        run: |
          docker logs evidencebase-redis
          docker logs evidencebase-qdrant
          docker logs evidencebase-minio
